<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake | Scout</title>
  <link rel="stylesheet" href="/styles.css?v=11">
  <style>
    .snake-layout {
      display: grid;
      gap: 1rem;
    }

    .snake-headline {
      margin-bottom: 0.4rem;
    }

    .snake-topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }

    .snake-metrics,
    .snake-pickers {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid var(--line);
      background: #0c1629;
      border-radius: 999px;
      padding: 0.32rem 0.66rem;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .snake-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: linear-gradient(165deg, #12213b, #152846);
      color: var(--text);
      border-radius: 999px;
      padding: 0.42rem 0.78rem;
      font: inherit;
      font-size: 0.9rem;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: #35527d;
    }

    .color-box {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--line);
      background: linear-gradient(165deg, #0d1a30, #122543);
      border-radius: 999px;
      padding: 0.3rem 0.45rem 0.3rem 0.7rem;
      min-width: 124px;
      cursor: pointer;
    }

    .color-box span {
      color: var(--muted);
      font-size: 0.84rem;
      letter-spacing: 0.02em;
    }

    .color-picker {
      -webkit-appearance: none;
      appearance: none;
      width: 42px;
      height: 26px;
      border: 1px solid #27436f;
      border-radius: 999px;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .color-picker::-webkit-color-swatch-wrapper {
      padding: 0;
      border-radius: 999px;
    }

    .color-picker::-webkit-color-swatch {
      border: 0;
      border-radius: 999px;
    }

    .color-picker::-moz-color-swatch {
      border: 0;
      border-radius: 999px;
    }

    .snake-board-wrap {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #091223;
      padding: 0.7rem;
      display: grid;
      place-items: center;
    }

    #snake-board {
      display: block;
      width: min(100%, 480px);
      height: auto;
      border: 1px solid #21395f;
      border-radius: 10px;
      background: #050a14;
      image-rendering: pixelated;
    }

    .snake-help {
      margin: 0;
      font-size: 0.9rem;
    }

    .touch-controls {
      display: grid;
      grid-template-columns: repeat(3, 54px);
      justify-content: center;
      gap: 0.42rem;
      margin-top: 0.5rem;
    }

    .touch-controls button {
      border-radius: 12px;
      padding: 0.6rem 0;
    }

    .touch-controls .empty {
      visibility: hidden;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="/">Scout</a>
      <nav class="nav-links" aria-label="Primary">
        <a href="/">Daily Brief</a>
        <a class="active" href="/projects/snake.html">Snake</a>
        <a href="/projects/project-02.html">Project 02</a>
        <a href="/projects/project-03.html">Project 03</a>
        <a href="/projects/project-04.html">Project 04</a>
        <a href="/projects/project-05.html">Project 05</a>
        <a href="/projects/project-06.html">Project 06</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <article class="panel snake-layout">
      <h1 class="snake-headline">Snake</h1>
      <p class="lead">Use arrow keys or WASD to move. Any movement key starts the game. Avoid walls and your own tail.</p>

      <div class="snake-topbar">
        <div class="snake-metrics">
          <span class="chip">Score: <strong id="score">0</strong></span>
          <span class="chip">Best: <strong id="best">0</strong></span>
          <span class="chip">State: <strong id="state">Ready</strong></span>
        </div>
        <div class="snake-actions">
          <button id="start-btn" type="button">Start</button>
          <button id="restart-btn" type="button">Restart</button>
        </div>
      </div>

      <div class="snake-pickers" aria-label="Color pickers">
        <label class="color-box" for="snake-color">
          <span>Snake</span>
          <input id="snake-color" class="color-picker" type="color" value="#7cf7d2" title="Snake color" aria-label="Snake color">
        </label>
        <label class="color-box" for="food-color">
          <span>Food</span>
          <input id="food-color" class="color-picker" type="color" value="#56d4ff" title="Food color" aria-label="Food color">
        </label>
      </div>

      <div class="snake-board-wrap">
        <canvas id="snake-board" width="480" height="480" aria-label="Snake game board"></canvas>
      </div>

      <p class="snake-help">Controls: Arrow keys / WASD. On mobile, use the directional buttons below.</p>

      <div class="touch-controls" aria-label="Touch controls">
        <span class="empty"></span>
        <button data-dir="up" type="button">Up</button>
        <span class="empty"></span>
        <button data-dir="left" type="button">Left</button>
        <button data-dir="down" type="button">Down</button>
        <button data-dir="right" type="button">Right</button>
      </div>
    </article>
  </main>

  <script>
    (function () {
      const board = document.getElementById("snake-board");
      const ctx = board.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const stateEl = document.getElementById("state");
      const startBtn = document.getElementById("start-btn");
      const restartBtn = document.getElementById("restart-btn");
      const snakeColorInput = document.getElementById("snake-color");
      const foodColorInput = document.getElementById("food-color");

      const tileSize = 24;
      const tiles = board.width / tileSize;
      const speed = 120;
      const bestKey = "scout_og_snake_best";

      let snake;
      let dir;
      let nextDir;
      let food;
      let score;
      let loopId;
      let running = false;
      let gameOver = false;

      let snakeColor = snakeColorInput.value;
      let foodColor = foodColorInput.value;

      function randomCell() {
        return {
          x: Math.floor(Math.random() * tiles),
          y: Math.floor(Math.random() * tiles)
        };
      }

      function placeFood() {
        let candidate = randomCell();
        while (snake.some((part) => part.x === candidate.x && part.y === candidate.y)) {
          candidate = randomCell();
        }
        food = candidate;
      }

      function setState(label) {
        stateEl.textContent = label;
      }

      function loadBest() {
        const value = Number(localStorage.getItem(bestKey) || "0");
        bestEl.textContent = String(value);
      }

      function saveBest(value) {
        const best = Number(localStorage.getItem(bestKey) || "0");
        if (value > best) {
          localStorage.setItem(bestKey, String(value));
          bestEl.textContent = String(value);
        }
      }

      function clamp(value) {
        return Math.max(0, Math.min(255, value));
      }

      function shade(hex, amount) {
        const raw = hex.replace("#", "");
        const r = clamp(parseInt(raw.slice(0, 2), 16) + amount);
        const g = clamp(parseInt(raw.slice(2, 4), 16) + amount);
        const b = clamp(parseInt(raw.slice(4, 6), 16) + amount);
        return "#" + [r, g, b].map((n) => n.toString(16).padStart(2, "0")).join("");
      }

      function applyPickerVisual(inputEl) {
        const hex = inputEl.value;
        const raw = hex.replace("#", "");
        const r = parseInt(raw.slice(0, 2), 16);
        const g = parseInt(raw.slice(2, 4), 16);
        const b = parseInt(raw.slice(4, 6), 16);
        const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        inputEl.style.background = hex;
        inputEl.style.borderColor = luminance > 0.55 ? "#35527d" : "#5b7db0";
        const wrapper = inputEl.closest(".color-box");
        if (wrapper) {
          wrapper.style.borderColor = luminance > 0.55 ? "#35527d" : "#5b7db0";
          wrapper.style.background = "linear-gradient(165deg, " + shade(hex, -140) + ", " + shade(hex, -108) + ")";
        }
      }
      function resetGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        running = false;
        gameOver = false;
        scoreEl.textContent = "0";
        placeFood();
        setState("Ready");
        draw();
      }

      function drawCell(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * tileSize + 1, y * tileSize + 1, tileSize - 2, tileSize - 2);
      }

      function drawGrid() {
        ctx.fillStyle = "#050a14";
        ctx.fillRect(0, 0, board.width, board.height);

        ctx.strokeStyle = "#0f1b31";
        ctx.lineWidth = 1;
        for (let i = 0; i <= tiles; i += 1) {
          const pos = i * tileSize;
          ctx.beginPath();
          ctx.moveTo(pos, 0);
          ctx.lineTo(pos, board.height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, pos);
          ctx.lineTo(board.width, pos);
          ctx.stroke();
        }
      }

      function draw() {
        drawGrid();
        drawCell(food.x, food.y, foodColor);
        const bodyColor = shade(snakeColor, -55);
        snake.forEach((part, idx) => {
          drawCell(part.x, part.y, idx === 0 ? snakeColor : bodyColor);
        });
      }

      function collide(point) {
        if (point.x < 0 || point.x >= tiles || point.y < 0 || point.y >= tiles) {
          return true;
        }
        return snake.some((part) => part.x === point.x && part.y === point.y);
      }

      function tick() {
        dir = nextDir;
        const head = snake[0];
        const nextHead = { x: head.x + dir.x, y: head.y + dir.y };

        if (collide(nextHead)) {
          running = false;
          gameOver = true;
          clearInterval(loopId);
          setState("Game Over");
          saveBest(score);
          return;
        }

        snake.unshift(nextHead);

        if (nextHead.x === food.x && nextHead.y === food.y) {
          score += 1;
          scoreEl.textContent = String(score);
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function setDirection(dx, dy) {
        if (dx === -dir.x && dy === -dir.y) {
          return;
        }
        nextDir = { x: dx, y: dy };
      }

      function startGame() {
        if (running) {
          return;
        }

        if (gameOver) {
          resetGame();
        }

        running = true;
        setState("Running");
        clearInterval(loopId);
        loopId = setInterval(tick, speed);
      }

      function restartGame() {
        clearInterval(loopId);
        resetGame();
      }

      function directionFromKey(key) {
        if (key === "arrowup" || key === "w") return { x: 0, y: -1 };
        if (key === "arrowdown" || key === "s") return { x: 0, y: 1 };
        if (key === "arrowleft" || key === "a") return { x: -1, y: 0 };
        if (key === "arrowright" || key === "d") return { x: 1, y: 0 };
        return null;
      }

      document.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        const mapped = directionFromKey(key);

        if (mapped) {
          event.preventDefault();
          if (!running) {
            startGame();
          }
          setDirection(mapped.x, mapped.y);
          return;
        }

        if (!running && key === " ") {
          startGame();
        }
      });

      document.querySelectorAll("[data-dir]").forEach((button) => {
        button.addEventListener("click", () => {
          const dirName = button.getAttribute("data-dir");
          const map = {
            up: { x: 0, y: -1 },
            down: { x: 0, y: 1 },
            left: { x: -1, y: 0 },
            right: { x: 1, y: 0 }
          };
          const mapped = map[dirName];
          if (!mapped) {
            return;
          }
          if (!running) {
            startGame();
          }
          setDirection(mapped.x, mapped.y);
        });
      });

      snakeColorInput.addEventListener("change", function () {
        snakeColor = snakeColorInput.value;
        applyPickerVisual(snakeColorInput);
        draw();
      });

      foodColorInput.addEventListener("change", function () {
        foodColor = foodColorInput.value;
        applyPickerVisual(foodColorInput);
        draw();
      });

      startBtn.addEventListener("click", startGame);
      restartBtn.addEventListener("click", restartGame);

      loadBest();
      applyPickerVisual(snakeColorInput);
      applyPickerVisual(foodColorInput);
      resetGame();
    })();
  </script>
</body>
</html>
